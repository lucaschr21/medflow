spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medflow}}
    username: ${DB_USERNAME:medflow}
    password: ${DB_PASSWORD:medflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        '[default_schema]': ${DB_SCHEMA:medflow}
        '[format_sql]': true
        '[schema_update.unique_constraint_strategy]': RECREATE_QUIETLY
    open-in-view: false
  flyway:
    enabled: true
    create-schemas: true
    default-schema: ${DB_SCHEMA:medflow}
    schemas: ${DB_SCHEMA:medflow}
    locations: classpath:migration

medflow:
  security:
    oauth2:
      enabled: false
      issuer-uri: ${MEDFLOW_OAUTH2_ISSUER_URI:}
      audience: ${MEDFLOW_OAUTH2_AUDIENCE:}
      clock-skew: ${MEDFLOW_OAUTH2_CLOCK_SKEW:60s}
