spring:
  application:
    name: medflow
  config:
    import: optional:file:.env[.properties]

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /docs
    disable-swagger-default-url: true
  show-actuator: true

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
