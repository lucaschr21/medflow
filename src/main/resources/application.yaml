spring:
  application:
    name: medflow
  config:
    import: optional:file:.env[.properties]

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /docs
    disable-swagger-default-url: true
  show-actuator: true

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

medflow:
  security:
    oauth2:
      enabled: false
      issuer-uri: ${MEDFLOW_OAUTH2_ISSUER_URI:}
      audience: ${MEDFLOW_OAUTH2_AUDIENCE:}
      clock-skew: ${MEDFLOW_OAUTH2_CLOCK_SKEW:60s}
