<p-drawer
  [(visible)]="visible"
  [modal]="false"
  [showCloseIcon]="false"
  [closeOnEscape]="false"
  [dismissible]="false"
  (onHide)="visible = true"
  [style]="{ width: '300px' }"
  styleClass="!bg-gradient-to-b !from-[#0f172a] !to-[#1e293b] border-r border-[#1e293b] text-slate-300"
  contentStyleClass="!bg-transparent"
  headerStyleClass="!bg-transparent"
>
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3 text-xl font-bold tracking-tight text-white">
      <div
        class="flex items-center justify-center rounded-lg bg-indigo-500 p-2 shadow-lg shadow-indigo-500/20"
      >
        <i class="pi pi-heart-fill text-xl text-white"></i>
      </div>
      MedFlow
    </div>
  </ng-template>
  <nav class="flex flex-1 flex-col gap-2 overflow-y-auto px-1 pb-6">
    <div class="mb-2 px-2 text-xs font-semibold tracking-wider text-slate-500 uppercase">
      principal
    </div>
    <div
      class="mb-2 cursor-pointer overflow-hidden rounded-xl bg-indigo-600/20 p-3 text-white shadow-md backdrop-blur-sm transition-all hover:translate-y-[-2px] hover:bg-indigo-600/30"
    >
      <div class="flex flex-col gap-1 p-1">
        <div class="flex items-center gap-2 font-bold text-indigo-300">
          <i class="pi pi-home text-lg"></i>
          <span>Painel inicial</span>
        </div>
        <p class="m-0 pl-6 text-xs font-medium text-indigo-200/80">Visão geral do MedFlow</p>
      </div>
    </div>

    <div
      class="mb-2 cursor-pointer overflow-hidden rounded-xl border border-slate-700/50 bg-slate-800/40 p-3 text-slate-300 shadow-sm transition-all hover:translate-y-[-2px] hover:bg-slate-800/80 hover:shadow-md"
    >
      <div class="flex flex-col gap-1 p-1">
        <div class="flex items-center gap-2 font-semibold text-slate-300">
          <i class="pi pi-calendar-plus text-lg text-emerald-400"></i>
          <span>Novo agendamento</span>
        </div>
        <p class="m-0 pl-6 text-xs text-slate-400">Marcar nova consulta</p>
      </div>
    </div>

    <div class="mt-6 mb-2 px-2 text-xs font-semibold tracking-wider text-slate-500 uppercase">
      Consultas
    </div>

    <div
      class="mb-2 cursor-pointer overflow-hidden rounded-xl border border-slate-700/50 bg-slate-800/40 p-3 text-slate-300 shadow-sm transition-all hover:translate-y-[-2px] hover:bg-slate-800/80 hover:shadow-md"
    >
      <div class="flex flex-col gap-1 p-1">
        <div class="flex items-center gap-2 font-semibold text-slate-300">
          <i class="pi pi-calendar text-lg text-sky-400"></i>
          <span>Meus agendamentos</span>
        </div>
        <p class="m-0 pl-6 text-xs text-slate-400">Visualize seus horários</p>
      </div>
    </div>

    <div
      class="mb-2 cursor-pointer overflow-hidden rounded-xl border border-slate-700/50 bg-slate-800/40 p-3 text-slate-300 shadow-sm transition-all hover:translate-y-[-2px] hover:bg-slate-800/80 hover:shadow-md"
    >
      <div class="flex flex-col gap-1 p-1">
        <div class="flex items-center gap-2 font-semibold text-slate-300">
          <i class="pi pi-history text-lg text-purple-400"></i>
          <span>Histórico médico</span>
        </div>
        <p class="m-0 pl-6 text-xs text-slate-400">Consulte seu prontuário</p>
      </div>
    </div>
  </nav>

  <div class="border-t border-slate-800 p-6">
    <div
      class="cursor-pointer overflow-hidden rounded-xl border border-slate-700/50 bg-slate-800/30 p-3 text-slate-300 shadow-sm transition-all hover:translate-y-[-2px] hover:bg-slate-800/60"
    >
      <div class="flex flex-col gap-1 p-1">
        <div class="flex items-center gap-2 font-semibold text-slate-300">
          <i class="pi pi-question-circle text-lg text-slate-400"></i>
          <span>Central de ajuda</span>
        </div>
        <p class="m-0 pl-6 text-[10px] leading-tight text-slate-400">
          Precisa de ajuda? Fale com nosso suporte técnico.
        </p>
      </div>
    </div>
  </div>
</p-drawer>
